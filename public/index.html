<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Background Remover - 一键移除图片背景</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🎨 Image Background Remover</h1>
      <p class="subtitle">一键移除图片背景，5 秒搞定抠图</p>
    </header>

    <main>
      <!-- 上传区域 -->
      <div class="upload-area" id="uploadArea">
        <div class="upload-content">
          <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          <p class="upload-text">拖拽图片到此处 或 <span class="upload-link">点击上传</span></p>
          <p class="upload-hint">支持 JPG/PNG，最大 25MB</p>
        </div>
        <input type="file" id="fileInput" accept="image/jpeg,image/png" hidden>
      </div>

      <!-- 处理中 -->
      <div class="processing" id="processing" style="display: none;">
        <div class="spinner"></div>
        <p>正在移除背景...</p>
      </div>

      <!-- 结果展示 -->
      <div class="result" id="result" style="display: none;">
        <div class="result-header">
          <h2>处理完成！</h2>
          <button class="btn-reset" id="resetBtn">再处理一张</button>
        </div>
        <div class="result-content">
          <div class="image-comparison">
            <div class="image-box">
              <p class="image-label">原图</p>
              <img id="originalImage" alt="Original">
            </div>
            <div class="image-box">
              <p class="image-label">去背后</p>
              <img id="processedImage" alt="Processed">
            </div>
          </div>
          <button class="btn-download" id="downloadBtn">⬇️ 下载透明背景图片</button>
        </div>
      </div>

      <!-- 错误提示 -->
      <div class="error" id="error" style="display: none;">
        <p id="errorMessage"></p>
        <button class="btn-retry" id="retryBtn">重试</button>
      </div>
    </main>

    <footer>
      <p>Powered by Cloudflare Workers & remove.bg API</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
